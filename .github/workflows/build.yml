name: Build APK & Windows exe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lecture-glass-apk-debug
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lecture-glass-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  windows-exe:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Visual Studio 2019 Build Tools
        shell: pwsh
        run: |
          choco install visualstudio2019buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --includeOptional --passive --norestart"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Windows exe
        run: flutter build windows --debug

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: lecture-glass-windows-debug
          path: build/windows/x64/runner/Debug/
          retention-days: 14

      - name: Build Windows exe (release)
        run: flutter build windows

      - name: Upload exe release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lecture-glass-windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 14
