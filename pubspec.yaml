name: lecture_glass_ai
description: "LectureGlass AI - 大学講義のローカル文字起こし・AI要約・同期・Obsidian連携アプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # DB
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.4.7
  path_provider: ^2.1.5
  path: ^1.9.0

  # Audio
  file_picker: ^8.1.7
  ffmpeg_kit_flutter_min_gpl: ^6.0.3
  record: ^5.2.0

  # Whisper (TODO: add whisper_ggml_plus or custom whisper.cpp FFI later)
  # whisper_ggml_plus: ^0.0.7

  # Network
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^4.2.1

  # Obsidian URI
  url_launcher: ^6.3.1

  # Supabase
  supabase_flutter: ^2.8.3

  # JSON / Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Error monitoring
  sentry_flutter: ^8.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # DB viewer (dev only)
  drift_db_viewer: ^2.1.0

flutter:
  uses-material-design: true

  # fonts:
  #   - family: NotoSansJP
  #     fonts:
  #       - asset: assets/fonts/NotoSansJP-Regular.ttf
  #       - asset: assets/fonts/NotoSansJP-Bold.ttf
  #         weight: 700